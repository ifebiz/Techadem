kind = "web"
previewPath = "/"
title = "Techadem"
version = "1.0.0"
id = "artifacts/techadem"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21422

[services.development]
run = "pnpm --filter @workspace/techadem run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/techadem", "run", "build" ]
publicDir = "artifacts/techadem/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21422"
BASE_PATH = "/"
